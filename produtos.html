<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Prime - Produtos</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
margin:0;
background:#f4f6f9;
}

/* MENU */

header{
background:#111;
color:white;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

header h1{
margin:0;
font-size:22px;
}

nav a{
color:white;
margin-left:20px;
text-decoration:none;
font-size:14px;
}

nav a:hover{
color:#ffcc00;
}

/* PRODUTOS */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 4px 15px rgba(0,0,0,0.1);
overflow:hidden;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.title{
font-size:16px;
margin-bottom:10px;
}

.price{
color:#27ae60;
font-size:18px;
font-weight:bold;
margin-bottom:15px;
}

.buy{
display:block;
text-align:center;
background:#ff6600;
color:white;
padding:10px;
border-radius:5px;
text-decoration:none;
}

.buy:hover{
background:#e65c00;
}

/* RODAPÉ */

footer{
text-align:center;
padding:20px;
background:#111;
color:white;
margin-top:30px;
}

</style>
</head>

<body>

<header>
<h1>Shopping Prime</h1>

<nav>
<a href="#">Home</a>
<a href="#">Produtos</a>
<a href="#">Promoçőes</a>
<a href="#">Contato</a>
</nav>

</header>

<div class="container">

<div class="grid">

<!-- PRODUTO 1 -->
<div class="card">
<img src="https://via.placeholder.com/400x300" alt="Produto">
<div class="card-content">
<div class="title">Pano de Microfibra Automotiva 600GSM Premium</div>
<div class="price">R$ 29,90</div>
<a class="buy" href="https://seusite.com/comprar1">Comprar</a>
</div>
</div>

<!-- PRODUTO 2 -->
<div class="card">
<img src="https://via.placeholder.com/400x300" alt="Produto">
<div class="card-content">
<div class="title">Fone Bluetooth Gamer X15</div>
<div class="price">R$ 89,90</div>
<a class="buy" href="https://seusite.com/comprar2">Comprar</a>
</div>
</div>

<!-- PRODUTO 3 -->
<div class="card">
<img src="https://via.placeholder.com/400x300" alt="Produto">
<div class="card-content">
<div class="title">Cozedor Elétrico de Ovos</div>
<div class="price">R$ 40,00</div>
<a class="buy" href="https://seusite.com/comprar3">Comprar</a>
</div>
</div>

</div>

</div>

<footer>
© 2026 Shopping Prime - Todos os direitos reservados
</footer>

</body>
</html>
